##
## Configuration file for the Clam AV daemon shipped with the `rocket-clamav` image.
## It preserves the effective settings of the official `clamav/clamav` base image and adds
## tuning on top of them. For all available options, see the clamd.conf(5) manual:
## https://manpages.debian.org/unstable/clamav-daemon/clamd.conf.5.en.html
##

# Settings preserved from the official `clamav/clamav` base image. The local socket is kept
# because the built-in healthcheck (`clamdcheck.sh`) communicates with the daemon through it:
LogFile /var/log/clamav/clamd.log
LogTime yes
LocalSocket /tmp/clamd.sock
TCPSocket 3310
User clamav

# Maximum size of a single data stream submitted for scanning over the clamd protocol
# (the INSTREAM command). Streams larger than this are rejected, so the value must not be lower
# than the effective upload limits of the SR Instance (request size limits, the
# `client_max_body_size` directive of the SR Nginx etc.):
StreamMaxLength 100M

# Maximum size of a scanned file and maximum amount of data scanned for each input file
# (archives and other containers are recursively extracted and scanned up to this limit):
MaxFileSize 100M
MaxScanSize 400M

# Reload the virus definitions database in place instead of building a second copy of it
# in parallel. This halves the RAM spike during reloads at the cost of a brief pause
# in scanning while the reload is in progress:
ConcurrentDatabaseReload no

# Maximum time in milliseconds a single scan may take, so that a wedged scan
# can't block the daemon indefinitely:
MaxScanTime 120000
